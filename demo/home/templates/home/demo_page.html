<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
</head>
<body>
    <h1>{{ page.title }}</h1>
    {% for block in page.body %}
        {% if block.block_type == "demo_block" %}
        <div>
            <p><strong>Required text:</strong> {{ block.value.required_text }}</p>
            <p><strong>Optional text:</strong> {{ block.value.optional_text|default:"(empty)" }}</p>
        </div>
        {% endif %}
    {% endfor %}
</body>
</html>
